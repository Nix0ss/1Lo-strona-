<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projekty uczniów</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.header{
padding:40px;
text-align:center;
background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.header h1{
margin:0;
font-size:42px;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:18px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input, textarea{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:18px;
border:none;
border-radius:10px;
background:#334155;
color:white;
font-size:15px;
box-sizing:border-box;
}

button{
background:#2563eb;
color:white;
border:none;
padding:14px 24px;
border-radius:10px;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
background:#3b82f6;
}

.project{
background:#334155;
padding:20px;
border-radius:14px;
margin-bottom:15px;
}

.project h3{
margin-top:0;
}

.download{
display:inline-block;
margin-top:10px;
background:#22c55e;
padding:10px 16px;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:bold;
}

.status{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:13px;
margin-top:10px;
}

.pending{
background:#f59e0b;
}

.approved{
background:#22c55e;
}

.admin{
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
<h1>Projekty uczniów</h1>
<p>Wyślij projekt do szkolnej drukarki 3D</p>
</div>

<div class="container">

<div class="card">

<h2>Dodaj projekt</h2>

<input type="text" id="name" placeholder="Nazwa projektu">

<textarea id="desc" placeholder="Opis projektu"></textarea>

<input type="file" id="file">

<button onclick="addProject()">Wyślij projekt</button>

</div>

<div class="card">

<h2>Publiczne projekty</h2>

<div id="projects"></div>

</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = 'https://gieetlvcdxrhonmgdexn.supabase.co'

const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZWV0bHZjZHhyaG9ubWdkZXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDE4NzMsImV4cCI6MjA5NDg3Nzg3M30.sx66Pi3bRuUNZk0sy82khaXa53B6zbKyJrdUY8KW9F4'

const supabase = createClient(supabaseUrl, supabaseKey)

async function loadProjects(){

const { data, error } = await supabase
.from('projekty')
.select('*')
.eq('approved', true)
.order('id', { ascending:false })

const container = document.getElementById("projects")

container.innerHTML=""

data.forEach(project=>{

container.innerHTML += `
<div class="project">

<h3>${project.name}</h3>

<p>${project.desc}</p>

<div class="status approved">
Zaakceptowany
</div>

<br>

<a class="download" href="${project.file_url}" target="_blank">
Pobierz projekt
</a>

</div>
`

})

}

window.addProject = async function(){

const name = document.getElementById("name").value
const desc = document.getElementById("desc").value
const file = document.getElementById("file").files[0]

if(!name || !desc || !file){
alert("Uzupełnij wszystkie pola")
return
}

const fileName = Date.now() + "_" + file.name

const { data:fileData, error:fileError } = await supabase.storage
.from('projekty')
.upload(fileName, file)

if(fileError){
alert("Błąd uploadu pliku")
console.log(fileError)
return
}

const fileUrl = `https://gieetlvcdxrhonmgdexn.supabase.co/storage/v1/object/public/projekty/${fileName}`

const { error } = await supabase
.from('projekty')
.insert([{
name:name,
desc:desc,
file_url:fileUrl,
approved:false
}])

if(error){
alert("Błąd zapisu")
console.log(error)
return
}

alert("Projekt wysłany do akceptacji!")

document.getElementById("name").value=""
document.getElementById("desc").value=""
document.getElementById("file").value=""

}

loadProjects()

</script>

</body>
</html>
