<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Projekty uczniów – Drukarka 3D</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#1d4ed8;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:30px;
}

h2{
margin-top:0;
}

input, textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
background:#1d4ed8;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#163ea8;
}

.project{
border-bottom:1px solid #eee;
padding:10px 0;
}

.project:last-child{
border:none;
}

.download{
color:#1d4ed8;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h1>Projekty uczniów – Drukarka 3D</h1>
<p>Dodaj swój projekt do szkolnej drukarki 3D</p>
</div>

<div class="container">

<div class="card">
<h2>Dodaj projekt</h2>

<input id="name" placeholder="Nazwa projektu">
<textarea id="desc" placeholder="Opis projektu"></textarea>
<input type="file" id="file">

<button onclick="addProject()">Dodaj projekt</button>
</div>

<div class="card">
<h2>Lista projektów</h2>
<div id="projects"></div>
</div>

</div>

<script>

function loadProjects(){
let projects = JSON.parse(localStorage.getItem("projekty")) || [];
let container = document.getElementById("projects");
container.innerHTML="";

projects.forEach(p=>{
container.innerHTML+=`
<div class="project">
<b>${p.name}</b><br>
${p.desc}<br>
<a class="download" href="${p.file}" download>Pobierz plik</a>
</div>
`;
});
}

function addProject(){

let name=document.getElementById("name").value;
let desc=document.getElementById("desc").value;
let file=document.getElementById("file").files[0];

if(!file){
alert("Dodaj plik projektu!");
return;
}

let reader=new FileReader();

reader.onload=function(e){

let projects = JSON.parse(localStorage.getItem("projekty")) || [];

projects.push({
name:name,
desc:desc,
file:e.target.result
});

localStorage.setItem("projekty",JSON.stringify(projects));

loadProjects();
};

reader.readAsDataURL(file);
}

loadProjects();

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEPt7u92MXcvGHpAGFZ6g6TmtpZeU0_8s",
  authDomain: "lo-strona.firebaseapp.com",
  projectId: "lo-strona",
  storageBucket: "lo-strona.firebasestorage.app",
  messagingSenderId: "1052786725625",
  appId: "1:1052786725625:web:cd2d9c019c8dd015ed4828"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("projectForm");
const projectList = document.getElementById("projectList");

form.addEventListener("submit", async (e) => {
e.preventDefault();

const name = document.getElementById("name").value;
const desc = document.getElementById("desc").value;
const file = document.getElementById("file").files[0];

const reader = new FileReader();

reader.onload = async function() {

await addDoc(collection(db, "projekty"), {
name: name,
desc: desc,
file: reader.result
});

alert("Projekt dodany!");

loadProjects();

};

reader.readAsDataURL(file);

});

async function loadProjects() {

projectList.innerHTML = "";

const querySnapshot = await getDocs(collection(db, "projekty"));

querySnapshot.forEach((doc) => {

const data = doc.data();

const div = document.createElement("div");

div.innerHTML = `
<h3>${data.name}</h3>
<p>${data.desc}</p>
<a href="${data.file}" download>Pobierz projekt</a>
<hr>
`;

projectList.appendChild(div);

});

}

loadProjects();

</script>

</body>
</html>
