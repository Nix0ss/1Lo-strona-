<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Projekty uczniów</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.header{
background:#1d4ed8;
color:white;
padding:25px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#1d4ed8;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#163ea8;
}

.project{
border-bottom:1px solid #ddd;
padding:15px 0;
}

.download{
color:#1d4ed8;
font-weight:bold;
text-decoration:none;
}

.status{
color:orange;
font-size:14px;
}

</style>
</head>

<body>

<div class="header">
<h1>Projekty uczniów</h1>
<p>Dodaj projekt do szkolnej drukarki 3D</p>
</div>

<div class="container">

<div class="card">

<h2>Dodaj projekt</h2>

<input type="text" id="name" placeholder="Nazwa projektu">

<textarea id="desc" placeholder="Opis projektu"></textarea>

<input type="file" id="file">

<button onclick="uploadProject()">
Wyślij projekt
</button>

<p class="status">
Projekt musi zostać zaakceptowany przez administratora.
</p>

</div>

<div class="card">

<h2>Zaakceptowane projekty</h2>

<div id="projects"></div>

</div>

</div>

<script>

const supabaseUrl = 'https://gieetlvcdxrhonmgdexn.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZWV0bHZjZHhyaG9ubWdkZXhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzMDE4NzMsImV4cCI6MjA5NDg3Nzg3M30.sx66Pi3bRuUNZk0sy82khaXa53B6zbKyJrdUY8KW9F4'

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

async function uploadProject(){

const name = document.getElementById("name").value
const desc = document.getElementById("desc").value
const file = document.getElementById("file").files[0]

if(!file){
alert("Dodaj plik")
return
}

const fileName = Date.now() + "_" + file.name

const { error: uploadError } = await supabase.storage
.from('projekty')
.upload(fileName, file)

if(uploadError){
alert("Błąd uploadu")
console.log(uploadError)
return
}

const fileUrl = supabase.storage
.from('projekty')
.getPublicUrl(fileName).data.publicUrl

const { error } = await supabase
.from('projekty')
.insert([{
name:name,
desc:desc,
file_url:fileUrl,
approved:false
}])

if(error){
alert("Błąd zapisu")
console.log(error)
return
}

alert("Projekt wysłany!")

loadProjects()

}

async function loadProjects(){

const projectsDiv = document.getElementById("projects")

projectsDiv.innerHTML = ""

const { data, error } = await supabase
.from('projekty')
.select('*')
.eq('approved', true)

if(error){
console.log(error)
return
}

data.forEach(project=>{

projectsDiv.innerHTML += `

<div class="project">

<h3>${project.name}</h3>

<p>${project.desc}</p>

<a class="download"
href="${project.file_url}"
download>

Pobierz projekt

</a>

</div>

`

})

}

loadProjects()

</script>

</body>
</html>
