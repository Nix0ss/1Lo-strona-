<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Projekty uczniów – Drukarka 3D</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
}

.header{
background:#1d4ed8;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:30px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
background:#1d4ed8;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#163ea8;
}

.project{
border-bottom:1px solid #eee;
padding:10px 0;
}

.download{
color:#1d4ed8;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<h1>Projekty uczniów – Drukarka 3D</h1>
<p>Dodaj swój projekt do szkolnej drukarki 3D</p>
</div>

<div class="container">

<div class="card">

<h2>Dodaj projekt</h2>

<input id="name" placeholder="Nazwa projektu">
<textarea id="desc" placeholder="Opis projektu"></textarea>
<input type="file" id="file">

<button id="addProjectBtn">Dodaj projekt</button>

</div>

<div class="card">

<h2>Lista projektów</h2>

<div id="projectList"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEPt7u92MXcvGHpAGFZ6g6TmtpZeU0_8s",
  authDomain: "lo-strona.firebaseapp.com",
  projectId: "lo-strona",
  storageBucket: "lo-strona.firebasestorage.app",
  messagingSenderId: "1052786725625",
  appId: "1:1052786725625:web:cd2d9c019c8dd015ed4828"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const button = document.getElementById("addProjectBtn");
const projectList = document.getElementById("projectList");

button.addEventListener("click", async () => {

const name = document.getElementById("name").value;
const desc = document.getElementById("desc").value;
const file = document.getElementById("file").files[0];

if(!file){
alert("Dodaj plik projektu!");
return;
}

const reader = new FileReader();

reader.onload = async function(){

await addDoc(collection(db,"projekty"),{
name:name,
desc:desc,
file:reader.result
});

alert("Projekt zapisany!");

loadProjects();

};

reader.readAsDataURL(file);

});

async function loadProjects(){

projectList.innerHTML="";

const querySnapshot = await getDocs(collection(db,"projekty"));

querySnapshot.forEach((doc)=>{

const data = doc.data();

projectList.innerHTML+=`
<div class="project">
<b>${data.name}</b><br>
${data.desc}<br>
<a class="download" href="${data.file}" download>Pobierz plik</a>
</div>
`;

});

}

loadProjects();

</script>

</body>
</html>
